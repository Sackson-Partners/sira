[mypy]
ignore_missing_imports = True

# SQLAlchemy 1.x Column attribute assignments produce false-positive [assignment]
# and [arg-type] errors because mypy sees Column[T] rather than T on model instances.
# These are suppressed per module until sqlalchemy2-stubs or SQLAlchemy 2.x typing is adopted.

[mypy-app.api.*]
ignore_errors = True

[mypy-app.routers.*]
ignore_errors = True

[mypy-app.services.*]
ignore_errors = True

[mypy-app.models.*]
ignore_errors = True

[mypy-app.core.supabase_auth]
ignore_errors = True

[mypy-app.core.database]
ignore_errors = True

[mypy-app.core.security]
ignore_errors = True

[mypy-app.core.auth]
ignore_errors = True

[mypy-app.main]
ignore_errors = True

[mypy-app.core.config]
ignore_errors = True
