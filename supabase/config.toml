# SIRA Platform — Supabase Configuration
# Authentication: JWT + OAuth2 + RBAC + Row Level Security
# Phase 2 MVP

[project]
project_id = "sira-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://localhost"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://sira-teal.vercel.app"
additional_redirect_urls = [
  "http://localhost:3000",
    "https://sira-teal.vercel.app",
      "https://*.vercel.app"
      ]
      jwt_expiry = 3600
      enable_refresh_token_rotation = true
      refresh_token_reuse_interval = 10
      enable_signup = true
      enable_anonymous_sign_ins = false
      enable_manual_linking = false
      minimum_password_length = 8
      password_requirements = ""

      [auth.email]
      enable_signup = true
      double_confirm_changes = true
      enable_confirmations = true
      secure_password_change = true
      max_frequency = "1s"
      otp_length = 6
      otp_expiry = 3600

      [auth.sms]
      enable_signup = false

      [auth.mfa]
      max_enrolled_factors = 10

      [auth.mfa.totp]
      enroll_enabled = false
      verify_enabled = false

      [auth.sessions]
      timebox = "168h"
      inactivity_timeout = "8h"

      [auth.oauth.github]
      enabled = false
      client_id = "env(GITHUB_CLIENT_ID)"
      secret = "env(GITHUB_CLIENT_SECRET)"

      [auth.oauth.google]
      enabled = false
      client_id = "env(GOOGLE_CLIENT_ID)"
      secret = "env(GOOGLE_CLIENT_SECRET)"

      [edge_runtime]
      enabled = true
      policy = "oneshot"
      inspector_port = 8083

      [analytics]
      enabled = false
