name: CI/CD — SIRA Platform (Azure Container Apps + ACR)

# LOCAL DEV:  docker build / docker-compose (see backend/docker-compose.yml)
# CI CLOUD:   docker buildx build → push to ACR → az containerapp update
# ACR FALLBACK (no local Docker): az acr build --registry $ACR_NAME --image sira-api:tag ./backend
#
# Required GitHub secrets:  AZURE_CREDENTIALS, SECRET_KEY, DB_ADMIN_PASSWORD,
#                            ALLOWED_ORIGINS, DATABASE_URL
# Required GitHub variables: ACR_NAME  (e.g. "siraregistry" — must match Bicep acrName param)
#
# Service principal in AZURE_CREDENTIALS needs:
#   - Contributor on resource group sira-rg
#   - AcrPush on the ACR  (or Contributor includes it)
#
# Triggers:
#   push to main/security-audit-on-main → test → build → deploy to staging
#   push tag v*.*.*                      → test → build → deploy to production
#   pull_request to main                 → test only (no push secrets)
#   workflow_dispatch                    → choose environment; optionally redeploy Bicep

on:
  push:
    branches: [main, security-audit-on-main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]
      deploy_infra:
        description: "Re-deploy Bicep infrastructure (slow, ~5 min)"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  RESOURCE_GROUP: sira-rg
  LOCATION: southafricanorth

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Test
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test (pytest ≥80% coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_docker.py \
            --tb=short -q \
            --cov=app --cov-report=term-missing \
            --cov-fail-under=80
        env:
          SECRET_KEY: ci-only-test-secret-key
          DATABASE_URL: ""   # tests use in-memory SQLite via conftest.py

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Build & Push Docker image to Azure Container Registry
#
# Two methods available:
#   PRIMARY  — docker buildx build --push  (uses GHA Docker daemon + layer cache)
#   FALLBACK — az acr build               (cloud build, no local Docker needed)
#              Run locally: az acr build --registry $ACR_NAME --image sira-api:tag ./backend
#
# Skipped on pull_request (no push secrets available there).
# ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push to ACR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    outputs:
      short_sha: ${{ steps.sha.outputs.value }}
      acr_login_server: ${{ steps.acr.outputs.login_server }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "value=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr show \
            --name "${{ vars.ACR_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query loginServer -o tsv)
          echo "login_server=${LOGIN_SERVER}" >> "$GITHUB_OUTPUT"
          echo "ACR: ${LOGIN_SERVER}"

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (primary — local Docker + GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/sira-api:sha-${{ steps.sha.outputs.value }}
            ${{ steps.acr.outputs.login_server }}/sira-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # FALLBACK: uncomment and replace the step above when local Docker is unavailable
      # - name: Build and push (fallback — az acr build, no local Docker)
      #   run: |
      #     az acr build \
      #       --registry "${{ vars.ACR_NAME }}" \
      #       --image "sira-api:sha-${{ steps.sha.outputs.value }}" \
      #       --image "sira-api:latest" \
      #       backend/

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — Deploy Infrastructure via Bicep (slow path, on-demand only)
# Use for first-time setup or when infra config changes.
# ─────────────────────────────────────────────────────────────────────────────
  deploy-infra:
    name: Deploy Bicep infrastructure
    needs: build-push
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_infra == 'true'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location "${{ env.LOCATION }}" \
            --output none

      - name: What-if (dry run)
        run: |
          az deployment group what-if \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/azure/main.bicep \
            --parameters \
              environment="${{ github.event.inputs.environment }}" \
              location="${{ env.LOCATION }}" \
              acrName="${{ vars.ACR_NAME }}" \
              secretKey="${{ secrets.SECRET_KEY }}" \
              dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" \
              allowedOrigins="${{ secrets.ALLOWED_ORIGINS }}"

      - name: Deploy Bicep
        id: bicep
        run: |
          az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/azure/main.bicep \
            --parameters \
              environment="${{ github.event.inputs.environment }}" \
              location="${{ env.LOCATION }}" \
              acrName="${{ vars.ACR_NAME }}" \
              secretKey="${{ secrets.SECRET_KEY }}" \
              dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" \
              allowedOrigins="${{ secrets.ALLOWED_ORIGINS }}" \
            --output json | tee /tmp/bicep-output.json

          FQDN=$(jq -r '.properties.outputs.apiGatewayFqdn.value' /tmp/bicep-output.json)
          ACR=$(jq -r '.properties.outputs.acrLoginServer.value' /tmp/bicep-output.json)
          echo "api_fqdn=${FQDN}" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=${ACR}" >> "$GITHUB_OUTPUT"
          echo "API FQDN: ${FQDN}  |  ACR: ${ACR}"

      - name: Run Alembic migrations
        working-directory: backend
        run: |
          pip install alembic psycopg2-binary
          alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 4 — Deploy App (fast path — update image only)
# Runs on every push to main/tags. Skipped when deploy-infra ran instead.
# ─────────────────────────────────────────────────────────────────────────────
  deploy-app:
    name: Deploy app to Azure Container Apps
    needs: build-push
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_infra == 'true')

    environment: >-
      ${{
        startsWith(github.ref, 'refs/tags/v') && 'production' ||
        github.event.inputs.environment ||
        'staging'
      }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment name
        id: env
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Alembic migrations
        working-directory: backend
        run: |
          pip install alembic psycopg2-binary
          alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Update Container App image
        run: |
          APP_NAME="sira-api-${{ steps.env.outputs.name }}"
          SHORT_SHA="${{ needs.build-push.outputs.short_sha }}"
          ACR_SERVER="${{ needs.build-push.outputs.acr_login_server }}"
          IMAGE="${ACR_SERVER}/sira-api:sha-${SHORT_SHA}"

          echo "Deploying ${IMAGE} to ${APP_NAME} ..."
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --output table

      - name: Wait for revision to become healthy
        run: |
          APP_NAME="sira-api-${{ steps.env.outputs.name }}"
          echo "Waiting for Container App revision to be active..."
          for i in $(seq 1 18); do
            STATE=$(az containerapp revision list \
              --name "$APP_NAME" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "sort_by([?properties.active], &properties.createdTime)[-1].properties.healthState" \
              -o tsv 2>/dev/null || echo "Unknown")
            echo "  Attempt $i/18 — healthState: ${STATE}"
            [[ "$STATE" == "Healthy" ]] && break
            sleep 10
          done

      - name: Health check — /health → 200
        id: health
        run: |
          APP_NAME="sira-api-${{ steps.env.outputs.name }}"
          FQDN=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Checking https://${FQDN}/health ..."
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 15 --retry 5 --retry-delay 6 \
            "https://${FQDN}/health")

          cat /tmp/health.json
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "ERROR: /health returned HTTP ${HTTP_CODE}"
            exit 1
          fi
          echo "Health check passed (HTTP 200)."
          echo "fqdn=${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          FQDN="${{ steps.health.outputs.fqdn }}"
          SHORT_SHA="${{ needs.build-push.outputs.short_sha }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### Deployment complete ✓
          | Field | Value |
          |-------|-------|
          | Environment | ${{ steps.env.outputs.name }} |
          | API | https://${FQDN} |
          | Docs | https://${FQDN}/docs |
          | Image | ${{ vars.ACR_NAME }}.azurecr.io/sira-api:sha-${SHORT_SHA} |
          EOF
